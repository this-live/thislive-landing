# this.live landing — single nginx static service.
#
# One service serves the umbrella (this.live / www.this.live) AND each pillar's
# own subdomain (cortex|maestro|mnemos|fabric|surfaces|forge.this.live).
# The six pillar pages already live at /<pillar>/index.html in the doc root and
# reference all assets by absolute root path (/design-system.css, /fonts/…,
# /favicon.png), so they resolve identically no matter which Host serves them.
#
# Host routing: a request for "/" on a pillar subdomain is internally rewritten
# to that pillar's page. Everything else (assets, /blog/, cross-pillar nav such
# as /maestro/) falls through to normal static serving, so the whole site stays
# reachable from any Host. See docs/SUBDOMAINS.md for the DNS + Railway setup.

# Map the request Host to the page served at "/".
# Apex / www / unknown hosts fall through to the umbrella /index.html.
map $host $pillar_home {
    default                 "/index.html";
    bryce.this.live         "/bryce.html";
    cortex.this.live        "/cortex/index.html";
    maestro.this.live       "/maestro/index.html";
    mnemos.this.live        "/mnemos/index.html";
    fabric.this.live        "/fabric/index.html";
    surfaces.this.live      "/surfaces/index.html";
    forge.this.live         "/forge/index.html";
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SCRUTINY Tier-3 #17: nginx defaults to absolute_redirects ON, which means
    # a request to /cortex (no trailing slash) on port 8080 was 301'ing to
    # http://this.live:8080/cortex/ — leaking the internal :8080 listen port
    # into the public URL, which Cloudflare then can't reach (522). Turn the
    # two port-redirect knobs off so trailing-slash redirects stay on the
    # origin's public scheme/host (handled by the Cloudflare proxy upstream).
    absolute_redirect off;
    port_in_redirect off;

    # Pillar subdomain landing: serve the pillar page for the bare "/" request.
    # Implemented as an exact-match location so it ONLY affects the root path —
    # assets and deeper paths are untouched and served normally below.
    location = / {
        # On a pillar host $pillar_home is that pillar's page; otherwise the
        # umbrella /index.html. Fall back to the umbrella if a page is missing.
        try_files $pillar_home /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
